<template>
    <lightning-card title="Prepare Flowdometer for Uninstall" icon-name="utility:delete">
        <div class="slds-p-around_medium">
            <div class="slds-text-body_regular slds-m-bottom_medium">
                <p class="slds-m-bottom_small">
                    Run this <strong>before</strong> uninstalling the Flowdometer managed package. It
                    deactivates Flowdometer flows, removes the dynamic lookup fields Flowdometer created
                    on your objects, and clears Flowdometer permission assignments &mdash; all of which
                    would otherwise block the uninstall.
                </p>
            </div>

            <template if:true={showNotAuthorized}>
                <div class="slds-box slds-theme_warning slds-m-bottom_medium">
                    You must be a Salesforce administrator (with the
                    <strong>Customize Application</strong> permission) to prepare Flowdometer
                    for uninstall. Please ask your system administrator to run this step.
                </div>
            </template>

            <lightning-button
                label="Prepare for Uninstall"
                variant="brand"
                onclick={handlePrepare}
                disabled={buttonDisabled}
                class="slds-m-right_small">
            </lightning-button>

            <div if:true={isLoading} class="slds-is-relative slds-m-top_medium slds-p-vertical_medium">
                <lightning-spinner alternative-text="Preparing for uninstall..." size="small"></lightning-spinner>
            </div>

            <div if:true={showResult} class="slds-m-top_medium">
                <p class={resultClass}>{resultMessage}</p>

                <template if:true={manualEraseRequired}>
                    <div class="slds-box slds-theme_warning slds-m-top_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">
                            Required next steps before uninstalling
                        </h3>
                        <ol class="slds-list_ordered slds-p-left_large">
                            <li>
                                The deleted lookup fields are now in each tracked object's <strong>Deleted Fields</strong> list.
                                Open <strong>Setup &gt; Object Manager &gt; [object] &gt; Fields &amp; Relationships &gt; Deleted Fields</strong>,
                                then click <strong>Erase</strong> on each Flowdometer field.
                                (Salesforce does not allow programmatic permanent deletion of fields in production orgs.)
                            </li>
                            <li>
                                Once the fields are erased, uninstall the package from <strong>Setup &gt; Installed Packages</strong>.
                            </li>
                        </ol>
                        <p class="slds-m-top_small">
                            <a href="/lightning/setup/ObjectManager/home" target="_blank">Open Object Manager</a>
                        </p>
                    </div>
                </template>

                <template if:true={success}>
                    <p class="slds-text-body_regular slds-m-top_medium">
                        Uninstall from <a href="/lightning/setup/ImportedPackage/home" target="_blank">Setup &gt; Installed Packages</a>.
                    </p>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
