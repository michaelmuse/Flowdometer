<template>
    <lightning-card title="Flowdometer Connection Setup" icon-name="standard:connected_apps">
        <div class="slds-p-around_medium">
            <!-- Loading -->
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Checking connection" size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Connected -->
            <template if:true={isConnected}>
                <div class="slds-text-align_center">
                    <lightning-icon icon-name="utility:success" size="large" variant="success" class="slds-m-bottom_small"></lightning-icon>
                    <h2 class="slds-text-heading_medium slds-m-bottom_small">Connected</h2>
                    <p class="slds-text-body_regular slds-text-color_weak">Flowdometer is authorized and ready. You can now create Listeners.</p>
                </div>
            </template>

            <!-- Not Connected -->
            <template if:false={isConnected}>
                <template if:false={isLoading}>
                    <div class="slds-box slds-theme_warning slds-m-bottom_medium" role="status" aria-live="polite">
                        <div class="slds-media">
                            <div class="slds-media__figure">
                                <lightning-icon icon-name="utility:warning" size="medium" variant="warning"></lightning-icon>
                            </div>
                            <div class="slds-media__body">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">{statusMessage}</h3>
                                <p class="slds-text-body_regular">
                                    Flowdometer needs permission to make same‑org API calls to enable field history tracking and create lookup fields.
                                    This is a one‑time setup.
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Org & NC details -->
                    <div class="slds-m-bottom_medium">
                        <dl class="slds-list_horizontal slds-wrap">
                            <dt class="slds-item_label slds-truncate slds-text-color_weak" title="My Domain">My Domain:</dt>
                            <dd class="slds-item_detail slds-truncate" title={orgDomain}>{orgDomain}</dd>
                            <dt class="slds-item_label slds-truncate slds-text-color_weak" title="Named Credential">Named Credential:</dt>
                            <dd class="slds-item_detail slds-truncate" title="Flowdometer_API">Flowdometer_API</dd>
                            <dt class="slds-item_label slds-truncate slds-text-color_weak" title="Base URL">Base URL (placeholder):</dt>
                            <dd class="slds-item_detail slds-truncate" title="https://example.invalid/services/data/v61.0">https://example.invalid/services/data/v61.0</dd>
                        </dl>
                    </div>

                    <!-- Setup Steps -->
                    <div class="slds-text-align_center">
                        <lightning-button
                            variant="neutral"
                            label="Step 1: Edit Named Credential URL"
                            title="Open Named Credential to set your My Domain URL"
                            onclick={handleOpenNamedCredential}
                            icon-name="utility:setup"
                            class="slds-m-right_small">
                        </lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Step 2: Authorize Flowdometer"
                            title="Open External Credentials in Setup to authorize"
                            onclick={handleOpenExternalCredential}
                            icon-name="utility:lock"
                            class="slds-m-right_small">
                        </lightning-button>
                        <lightning-button
                            variant="success"
                            label="Step 3: Validate Connection"
                            title="Recheck connection status"
                            onclick={handleValidate}
                            icon-name="utility:refresh">
                        </lightning-button>
                    </div>

                    <!-- Error details (optional) -->
                    <template if:true={errorDetails}>
                        <div class="slds-m-top_medium">
                            <details class="slds-text-body_small slds-text-color_weak">
                                <summary style="cursor: pointer;">Technical Details</summary>
                                <pre class="slds-m-top_small slds-p-around_small slds-box" style="background-color: #f3f3f3; overflow-x: auto;">{errorDetails}</pre>
                            </details>
                        </div>
                    </template>
                </template>
            </template>

            <!-- Help -->
            <div class="slds-m-top_large slds-text-align_center">
                <p class="slds-text-body_small slds-text-color_weak">
                    Need help? Visit
                    <a href="https://flowdometer.com/docs/setup" target="_blank" rel="noopener noreferrer">the setup guide</a>
                    or email
                    <a href="mailto:help@flowdometer.com">help@flowdometer.com</a>.
                </p>
            </div>
        </div>
    </lightning-card>
</template>
