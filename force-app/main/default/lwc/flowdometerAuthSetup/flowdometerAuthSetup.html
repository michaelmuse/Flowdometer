<template>
    <lightning-card title="Flowdometer Connection Setup" icon-name="standard:connected_apps">
        <div class="slds-p-around_medium">
            <!-- Loading -->
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Checking connection" size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Connected -->
            <template if:true={isConnected}>
                <div class="slds-text-align_center">
                    <lightning-icon icon-name="utility:success" size="large" variant="success" class="slds-m-bottom_small"></lightning-icon>
                    <h2 class="slds-text-heading_medium slds-m-bottom_small">Connected</h2>
                    <p class="slds-text-body_regular slds-text-color_weak">Flowdometer is authorized and ready. You can now create Listeners.</p>
                </div>
            </template>

            <!-- Not Connected -->
            <template if:false={isConnected}>
                <template if:false={isLoading}>
                    <div class="slds-box slds-theme_shade slds-m-bottom_medium" role="status">
                        <div class="slds-media">
                            <div class="slds-media__figure">
                                <lightning-icon icon-name="utility:setup" size="medium"></lightning-icon>
                            </div>
                            <div class="slds-media__body">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">One-time connection setup</h3>
                                <p class="slds-text-body_regular slds-m-bottom_small">
                                    Flowdometer connects to your org through its packaged External Client App.
                                    An administrator enables it once with these steps:
                                </p>
                                <ol class="slds-list_ordered slds-m-left_medium slds-text-body_regular">
                                    <li class="slds-m-bottom_xx-small">Open the <strong>External Client App Manager</strong> (button below — opens in a new tab).</li>
                                    <li class="slds-m-bottom_xx-small">On the <strong>Flowdometer ECA</strong> row, open the dropdown and choose <strong>Edit Policies</strong>.</li>
                                    <li class="slds-m-bottom_xx-small">Expand <strong>OAuth Policies</strong> and check <strong>Enable Client Credentials Flow</strong>.</li>
                                    <li class="slds-m-bottom_xx-small">For <strong>Run As (Username)</strong>, enter a dedicated integration user (recommended) or an admin user.</li>
                                    <li>Click <strong>Save</strong>, then switch back to this tab.</li>
                                </ol>
                                <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                                    This screen detects the connection automatically once you save — no need to refresh.
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Setup Actions -->
                    <div class="slds-text-align_center slds-m-bottom_medium">
                        <a
                            href={ecaManagerUrl}
                            target="_blank"
                            rel="noopener noreferrer"
                            title="Opens the External Client App Manager in a new tab"
                            class="slds-button slds-button_brand slds-m-right_small">
                            Open External Client App Manager
                            <lightning-icon
                                icon-name="utility:new_window"
                                size="xx-small"
                                variant="inverse"
                                class="slds-m-left_x-small">
                            </lightning-icon>
                        </a>
                        <lightning-button
                            variant="neutral"
                            label="Check Connection"
                            title="Recheck connection status now"
                            onclick={handleValidate}
                            icon-name="utility:refresh">
                        </lightning-button>
                    </div>

                    <!-- Troubleshooting (only after a manual check that still shows disconnected) -->
                    <template if:true={showTroubleshooting}>
                        <div class="slds-box slds-theme_default slds-m-top_medium" style="border-left: 3px solid #c23934;">
                            <p class="slds-text-body_small slds-m-bottom_x-small">
                                <strong>Not connected yet</strong>
                            </p>
                            <p class="slds-text-body_small slds-text-color_weak">{errorDetails}</p>
                            <p class="slds-text-body_small slds-text-color_weak slds-m-top_small">
                                Confirm the Client Credentials Flow is enabled with a Run-As user on the
                                Flowdometer ECA, then try again. If this persists, contact help@flowdometer.com.
                            </p>
                        </div>
                    </template>
                </template>
            </template>

            <!-- Help -->
            <div class="slds-m-top_large slds-text-align_center">
                <p class="slds-text-body_small slds-text-color_weak">
                    Need help? Visit the <a href="https://www.flowdometer.com/documentation" target="_blank" rel="noopener noreferrer">setup guide</a> or email help@flowdometer.com.
                </p>
            </div>
        </div>
    </lightning-card>
</template>
